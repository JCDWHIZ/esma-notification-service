stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: "docker.io"
  IMAGE_NAME: "esma-shared"
  DOCKER_IMAGE: ${DOCKER_USERNAME}/${IMAGE_NAME}:latest

build-and-push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  tags:
  - esma
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Install dependencies
    - apk add --no-cache nodejs npm curl git
    # Set up QEMU
    - docker run --privileged --rm tonistiigi/binfmt --install all
    # Set up Docker Buildx
    - docker buildx create --use
  script:
    - echo "🐳 Logging in to Docker Hub..."
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - echo "🔨 Building and pushing Docker image..."
    - |
      docker buildx build \
        --platform linux/arm64 \
        --push \
        -t $DOCKER_IMAGE \
        -t ${DOCKER_USERNAME}/${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} \
        -f Dockerfile \
        .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

deploy-to-server:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Connecting to server and deploying..."
    - |
      ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
        "cd ~/server-setup/esma && \
        chmod +x ./restart && \
        ./restart"
    - echo "✅ Deployment completed successfully"
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
      needs: ["build-and-push"]
    - if: $CI_COMMIT_REF_NAME == "dev"
      needs: ["build-and-push"]
    - if: $CI_PIPELINE_SOURCE == "web"
      needs: ["build-and-push"]
  when: on_success

manual-deploy:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Manual deployment initiated..."
    - |
      ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
        "cd ~/server-setup/esma && \
        chmod +x ./restart && \
        ./restart"
    - echo "✅ Manual deployment completed successfully"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  allow_failure: false