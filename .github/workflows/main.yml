stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: esma-shared
  DOCKER_IMAGE: "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  NODE_VERSION: "18"  # Specify Node.js version

services:
  - docker:24.0.5-dind

build-and-push:
  stage: build
  image: docker:24.0.5
  tags:
    - esma
  before_script:
    # Install Node.js for TypeScript compilation
    - apk add --no-cache curl npm nodejs
    - node --version
    - npm --version
    # Install dependencies
    - npm ci  # Use npm ci for faster, reliable installs
    # Login to Docker registry
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD" $DOCKER_REGISTRY
  script:
    - echo "🔨 Building Docker image..."
    # Create buildx builder if it doesn't exist
    - docker buildx create --use --name mybuilder || docker buildx use mybuilder
    - docker buildx build \
        --platform linux/arm64 \
        --push \
        --tag "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest" \
        --tag "$DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$CI_COMMIT_SHA" \
        --file Dockerfile \
        .
  only:
    - main
    - dev
  # Add cache for node_modules
  cache:
    key: 
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/

deploy-to-server:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Connecting to server and deploying..."
    - |
      ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
        "cd ~/server-setup/esma && \
        docker pull $DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest && \
        chmod +x ./restart && \
        ./restart"
    - echo "✅ Deployment completed successfully"
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
      needs: ["build-and-push"]
    - if: '$CI_COMMIT_REF_NAME == "dev"'
      needs: ["build-and-push"]
  when: on_success

manual-deploy:
  stage: deploy
  image: alpine:latest
  tags:
    - esma
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Manual deployment initiated..."
    - |
      ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
        "cd ~/server-setup/esma && \
        docker pull $DOCKER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest && \
        chmod +x ./restart && \
        ./restart"
    - echo "✅ Manual deployment completed successfully"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  allow_failure: false