version: "3.8"

services:
  esma-shared-app:
    image: docker.io/elsofthub/esma-shared:latest
    container_name: esma-admin
    restart: always
    environment:
      - PORT=6072
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - CLOUDINARY_API_SECRET=test
      - CLOUDINARY_API_KEY=test
      - CLOUDINARY_CLOUD_NAME=test
      - EMAIL_USER=elsofthub@gmail.com
      - EMAIL_PASSWORD=test
      - FRONTEND_URL=https://localhost:5000
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    ports:
      - "6072:6072"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6072"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
